services:
  backend:
    build: ./backend
    container_name: stock-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - stock-net

  frontend:
    build: ./frontend
    container_name: stock-frontend
    ports:
      - "4321:4321"
    depends_on:
      - backend
    environment:
      - PUBLIC_WS_URL=ws://localhost:3000/ws
    restart: unless-stopped
    networks:
      - stock-net

networks:
  stock-net:
    driver: bridge